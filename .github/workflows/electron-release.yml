name: Build Desktop (EXE / AppImage)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            flag: --win
            artifact: "release/*.exe"
          - os: ubuntu-latest
            flag: --linux
            artifact: "release/*.AppImage"

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Ubuntu 24.04 (ubuntu-latest) often ships libwebkit2gtk-4.1-dev, not 4.0.
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -euo pipefail
          sudo apt-get update -y
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst-dev \
            libsecret-1-dev \
            libgbm-dev \
            libdrm-dev \
            libx11-xcb-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            fakeroot \
            xvfb
          sudo apt-get install -y libappindicator3-dev || sudo apt-get install -y libayatana-appindicator3-dev
          if apt-cache show libwebkit2gtk-4.1-dev >/dev/null 2>&1; then
            echo "Installing libwebkit2gtk-4.1-dev (Ubuntu 24.04+)"
            sudo apt-get install -y libwebkit2gtk-4.1-dev
          else
            echo "Installing libwebkit2gtk-4.0-dev (older Ubuntu)"
            sudo apt-get install -y libwebkit2gtk-4.0-dev
          fi

      - name: Install dependencies
        run: npm install

      - name: Build web app (Vite)
        run: npm run build

      - name: Build Electron app
        run: npx electron-builder ${{ matrix.flag }} --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
