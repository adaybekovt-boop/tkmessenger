name: Build & Release

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# Pin Flutter once so all jobs agree.
#
# 3.32.0 (stable, May 2025) is the first Flutter release whose
# `flutter create` android template ships with Kotlin Gradle plugin
# 2.1.x and AGP 8.7.x out of the box. Earlier 3.27.x stuck at Kotlin
# 1.8.22, which mobile_scanner ^6 refuses to compile against.
env:
  FLUTTER_VERSION: '3.32.0'
  FLUTTER_CHANNEL: 'stable'
  PROJECT_NAME: 'orbits_flutter'
  PROJECT_ORG: 'com.orbits'

# Allow only one in-flight run per ref. Cancels the previous build when you
# push again — keeps the queue short and runner minutes low.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────
  # Lint + tests. Non-fatal: we still ship even if analyze warns, because
  # the project is mid-migration and `flutter_lints` flags pre-existing
  # noise we haven't cleaned up yet. The build jobs depend on this so the
  # report is at least produced.
  # ────────────────────────────────────────────────────────────────────
  analyze:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: flutter pub get
        run: flutter pub get

      - name: Generate code (drift / build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      # Hard-fail on Dart compile errors (the analyzer treats those as
      # `error` severity even with --no-fatal-infos --no-fatal-warnings).
      # Without this gate a typo or wrong-version API call sails past
      # analyze and we only find out 6+ minutes later when `flutter build
      # apk` falls over on the kernel compile, with no actionable log
      # surfaced in the GitHub UI. Warnings/infos still don't block —
      # the project is mid-migration and has plenty of pre-existing
      # noise that's tracked separately.
      - name: flutter analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: flutter test
        run: flutter test --reporter expanded
        continue-on-error: true

  # ────────────────────────────────────────────────────────────────────
  # Android. The platform folders aren't checked in — we generate them
  # fresh on every CI run so a checkout of just `lib/` + `pubspec.yaml`
  # builds. Then we patch:
  #   • AndroidManifest.xml — INTERNET, CAMERA, RECORD_AUDIO permissions
  #     for WebRTC, mobile_scanner and `record`.
  #   • build.gradle — point release `signingConfig` at the debug keystore
  #     so `flutter build apk --release` produces a sideloadable APK
  #     without a real upload key. Cannot ship to Play Store like this,
  #     but it installs and updates fine on any device.
  #
  # The debug keystore lives in actions/cache so the signature stays
  # stable across runs (otherwise updates would require uninstall first).
  # ────────────────────────────────────────────────────────────────────
  build-android:
    name: Build Android (APK)
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Make sure SDK platform 35 + matching build-tools are present on
      # the runner. ubuntu-latest ships 33/34 by default; mobile_scanner 6
      # and the ML Kit transitives we patch compileSdk to 35 for need 35.
      - uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-35 build-tools;35.0.0 platform-tools'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Cache debug keystore
        uses: actions/cache@v4
        with:
          path: ~/.android
          key: android-debug-keystore-v1

      - name: Ensure debug keystore exists
        run: |
          mkdir -p ~/.android
          if [ ! -f ~/.android/debug.keystore ]; then
            keytool -genkeypair -v \
              -keystore ~/.android/debug.keystore \
              -storetype PKCS12 \
              -storepass android -keypass android \
              -alias androiddebugkey \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: flutter pub get
        run: flutter pub get

      - name: Generate android/ + web/ platforms
        run: |
          flutter create \
            --platforms=android,web \
            --org="$PROJECT_ORG" \
            --project-name="$PROJECT_NAME" \
            .

      - name: Patch AndroidManifest + signing config
        run: |
          sed -i 's/\r$//' tool/ci/patch_android.sh
          bash tool/ci/patch_android.sh

      # Drift / build_runner codegen MUST succeed for the app to compile
      # (lib/storage/* depends on the generated *.g.dart files). Keeping
      # this fatal so a codegen regression fails the job clearly rather
      # than cascading into a confusing "Type X not found" cascade later.
      - name: Generate code (drift / build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter build apk (split per ABI)
        run: flutter build apk --release --split-per-abi --verbose

      - name: flutter build apk (universal fallback)
        run: flutter build apk --release

      - name: Stage APKs for upload
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk            dist/orbits-android-universal.apk || true
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk  dist/orbits-android-arm64.apk     || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk dist/orbits-android-arm32.apk    || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk     dist/orbits-android-x86_64.apk    || true
          ls -lah dist/

      - uses: actions/upload-artifact@v4
        with:
          name: orbits-android
          path: dist/*.apk
          if-no-files-found: error
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────
  # Web. Static-site bundle, ship as a zip artifact. Two base-href
  # variants are produced:
  #   • orbits-web-relative.zip — `./` base-href, drop into any static
  #     host or open with file:// for local testing.
  #   • orbits-web-pages.zip    — `/tkmessenger/` base-href, ready for
  #     GitHub Pages at https://<owner>.github.io/tkmessenger/.
  # No GitHub Pages auto-deploy here — there's a separate pages.yml
  # workflow that handles publishing if/when the user wires it up.
  # ────────────────────────────────────────────────────────────────────
  build-web:
    name: Build Web (Static)
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable web
        run: flutter config --enable-web

      - name: flutter pub get
        run: flutter pub get

      - name: Generate web/ platform
        run: |
          flutter create \
            --platforms=web \
            --org="$PROJECT_ORG" \
            --project-name="$PROJECT_NAME" \
            .

      - name: Generate code (drift / build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      # Two bundles, two base-href flavors:
      #
      #   • relative (./)   — for static hosts that aren't at the domain
      #     root, and for `file://` previews. `flutter build web` itself
      #     refuses `--base-href "./"` ("should start and end with /"),
      #     so we build with `/` and post-process index.html to swap
      #     `<base href="/">` → `<base href="./">`. Same trick the
      #     Flutter team's own `flutter_tools/build/web` example uses.
      #
      #   • Pages (/tkmessenger/) — built directly, no rewriting needed.
      - name: flutter build web (relative base-href)
        run: |
          flutter build web --release --base-href "/"
          # rewrite to relative ./ for static-host / file:// previews
          sed -i 's|<base href="/">|<base href="./">|' build/web/index.html

      - name: Stage relative-base bundle
        run: |
          mkdir -p dist
          cp -r build/web dist/orbits-web-relative
          (cd dist && zip -qr orbits-web-relative.zip orbits-web-relative)

      - name: flutter build web (Pages base-href)
        run: flutter build web --release --base-href "/tkmessenger/"

      - name: Stage Pages bundle
        run: |
          cp -r build/web dist/orbits-web-pages
          (cd dist && zip -qr orbits-web-pages.zip orbits-web-pages)
          ls -lah dist/

      - uses: actions/upload-artifact@v4
        with:
          name: orbits-web
          path: dist/*.zip
          if-no-files-found: error
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────
  # Windows. Same generate-on-the-fly pattern. The `Release/` folder
  # bundles the .exe alongside the Flutter engine DLL and the
  # MSVCP/VCRUNTIME runtime DLLs that flutter_windows needs — zipping
  # the whole folder is what avoids the "VCRUNTIME140.dll missing"
  # popup users would otherwise see if you only ship the .exe.
  #
  # Marked `continue-on-error: true` so a flutter_webrtc / native plugin
  # snag on the Windows side doesn't gate the Android / web artifact
  # uploads — ship what builds, fix Windows in a follow-up.
  # ────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build Windows (EXE)
    needs: analyze
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: ${{ env.FLUTTER_CHANNEL }}
          cache: true

      - name: Enable windows desktop
        run: flutter config --enable-windows-desktop

      - name: flutter pub get
        run: flutter pub get

      - name: Generate windows/ + web/ platforms
        shell: bash
        run: |
          flutter create \
            --platforms=windows,web \
            --org="$PROJECT_ORG" \
            --project-name="$PROJECT_NAME" \
            .

      - name: Generate code (drift / build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: flutter build windows (release)
        run: flutter build windows --release

      - name: Bundle VC++ Redistributable runtime DLLs
        shell: pwsh
        run: |
          $rel = "build\windows\x64\runner\Release"
          $redist = Get-ChildItem "C:\Program Files (x86)\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $redist) {
            $redist = Get-ChildItem "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Redist\MSVC" -ErrorAction SilentlyContinue | Sort-Object Name -Descending | Select-Object -First 1
          }
          if ($redist) {
            $src = Join-Path $redist.FullName "x64\Microsoft.VC143.CRT"
            if (Test-Path $src) {
              Copy-Item "$src\*.dll" $rel -Force
              Write-Host "Copied VC runtime from $src"
            }
          } else {
            Write-Host "VC redist folder not found — relying on what flutter ships."
          }
          Get-ChildItem $rel | Format-Table Name, Length

      - name: Zip Windows release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path build\windows\x64\runner\Release\* `
            -DestinationPath dist\orbits-windows-x64.zip `
            -Force
          Get-ChildItem dist

      - uses: actions/upload-artifact@v4
        with:
          name: orbits-windows
          path: dist/orbits-windows-x64.zip
          if-no-files-found: warn
          retention-days: 30

  # ────────────────────────────────────────────────────────────────────
  # On a tag like `v0.1.0`, gather artifacts from every platform build
  # and attach them to a GitHub Release.
  # ────────────────────────────────────────────────────────────────────
  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-android, build-web, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Show artifacts
        run: ls -R artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/orbits-android/*.apk
            artifacts/orbits-web/*.zip
            artifacts/orbits-windows/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
