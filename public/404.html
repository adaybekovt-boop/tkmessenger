<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Orbits P2P - Redirecting...</title>
    <!-- 
      GitHub Pages 404 SPA Hack:
      Intercepts 404 errors for SPA routes, saves the requested path in sessionStorage, 
      and redirects to the index.html page so the frontend router can take over.
    -->
    <script type="text/javascript">
      var segmentCount = 1; // 1 for user.github.io/repo/, 0 for custom domain
      var l = window.location;
      var pathSegments = l.pathname.split('/').slice(1);
      var basePath = '/' + pathSegments.slice(0, segmentCount).join('/') + '/';
      
      sessionStorage.redirect = l.href;
      l.replace(l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + basePath);
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
