<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Orbits P2P</title>
  <style>
    :root {
      --bg: #050b14;
      --accent: #00f0ff;
      --accent-glow: rgba(0, 240, 255, 0.4);
      --glass: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text: #ffffff;
      --text-muted: #8ba1b5;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: var(--bg);
      background-image: radial-gradient(circle at center, #0B132B 0%, #030610 100%);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
    }

    .container {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 50px 40px;
      text-align: center;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 42px;
      letter-spacing: 6px;
      text-transform: uppercase;
      color: #fff;
      text-shadow: 0 0 15px var(--accent-glow), 0 0 30px var(--accent-glow);
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 16px;
      margin-bottom: 40px;
      line-height: 1.6;
    }

    /* Main Download Area */
    #main-download-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 40px;
      min-height: 150px; /* prevent layout shift */
    }

    .main-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 15px;
      width: 100%;
      padding: 20px;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 700;
      font-size: 20px;
      transition: all 0.3s ease;
      box-sizing: border-box;
      text-transform: uppercase;
      letter-spacing: 1px;
      position: relative;
      overflow: hidden;
      margin-bottom: 15px;
    }
    
    .main-btn::before {
      content: '';
      position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, transparent 40%);
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    .main-btn:hover::before { opacity: 1; }

    .btn-windows { background: rgba(0, 240, 255, 0.1); border: 1px solid var(--accent); color: var(--accent); }
    .btn-windows:hover { background: var(--accent); color: #000; box-shadow: 0 0 25px var(--accent-glow); }

    .btn-android { background: rgba(181, 69, 255, 0.1); border: 1px solid #b545ff; color: #b545ff; }
    .btn-android:hover { background: #b545ff; color: #000; box-shadow: 0 0 25px rgba(181, 69, 255, 0.4); }

    .btn-mac { background: rgba(255, 255, 255, 0.1); border: 1px solid #fff; color: #fff; }
    .btn-mac:hover { background: #fff; color: #000; box-shadow: 0 0 25px rgba(255, 255, 255, 0.4); }

    .btn-ios { background: rgba(255, 149, 0, 0.1); border: 1px solid #ff9500; color: #ff9500; }
    .btn-ios:hover { background: #ff9500; color: #000; box-shadow: 0 0 25px rgba(255, 149, 0, 0.4); }

    .main-icon { font-size: 28px; }

    /* Instructions & Info */
    .install-instructions {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      margin-bottom: 10px;
      width: 100%;
      background: rgba(0,0,0,0.2);
      padding: 15px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      text-align: left;
    }
    .install-instructions ul { margin: 8px 0 0 20px; padding: 0; }
    .install-instructions li { margin-bottom: 4px; }

    .badges {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }
    .badge {
      font-size: 11px;
      padding: 4px 8px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .hash-link {
      font-family: monospace;
      font-size: 11px;
      color: var(--text-muted);
      text-decoration: underline;
      transition: color 0.2s;
    }
    .hash-link:hover { color: #fff; }

    /* Other platforms */
    .other-platforms-container {
      border-top: 1px solid var(--glass-border);
      padding-top: 25px;
    }
    .other-platforms-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text-muted);
      margin-bottom: 15px;
    }
    .other-platforms-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    
    .small-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: all 0.2s;
    }
    .small-btn:hover {
      background: var(--glass);
      border-color: rgba(255,255,255,0.3);
    }
    .small-btn .icon { font-size: 16px; }

    .loading-spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(255,255,255,0.1);
      border-radius: 50%;
      border-top-color: var(--accent);
      animation: spin 1s linear infinite;
      margin: 20px auto;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="container">
    <h1>ORBITS</h1>
    <p class="subtitle">Decentralized P2P Messenger.<br/>Secure, direct, no central servers.</p>

    <!-- JS Injects UI Here based on OS -->
    <div id="main-download-area">
      <div class="loading-spinner"></div>
      <p style="color: var(--text-muted); font-size: 14px;">Определение платформы...</p>
    </div>

    <!-- Other platforms -->
    <div class="other-platforms-container" id="other-platforms" style="display: none;">
      <div class="other-platforms-title">Other platforms</div>
      <div class="other-platforms-grid" id="other-platforms-grid">
        <!-- Injected via JS -->
      </div>
    </div>
  </div>

  <script>
    function deriveRepoFromLocation() {
      try {
        if (location.hostname.endsWith('github.io')) {
          const owner = location.hostname.split('.')[0];
          const parts = location.pathname.split('/').filter(Boolean);
          if (parts.length > 0) return `${owner}/${parts[0]}`;
        }
      } catch (_) {}
      return null;
    }
    const repoFromQuery = new URLSearchParams(location.search).get('repo');
    const REPO = repoFromQuery || window.__ORBITS_REPO__ || deriveRepoFromLocation() || 'OWNER/REPO';

    // 1. Logic Platforms Definition
    const platforms = {
      windows: { id: 'windows', name: 'Windows', icon: '🪟', btnClass: 'btn-windows', actionText: 'Download for Windows', fileExt: '.exe', type: 'download' },
      android: { id: 'android', name: 'Android', icon: '📱', btnClass: 'btn-android', actionText: 'Download APK', fileExt: '.apk', type: 'download' },
      mac: { id: 'mac', name: 'macOS', icon: '🍎', btnClass: 'btn-mac', actionText: 'Download for macOS', fileExt: '.dmg', type: 'download' },
      ios: { id: 'ios', name: 'iOS', icon: '🍏', btnClass: 'btn-ios', actionText: 'Open in Browser', type: 'webapp' }
    };

    // 2. Detect OS
    function getOS() {
      const userAgent = window.navigator.userAgent || window.navigator.vendor || window.opera;
      if (/windows phone/i.test(userAgent)) return 'windows';
      if (/android/i.test(userAgent)) return 'android';
      if (/iPad|iPhone|iPod/.test(userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1)) return 'ios';
      if (/Macintosh|Mac OS X/i.test(userAgent)) return 'mac';
      if (/Win/i.test(userAgent)) return 'windows';
      return 'windows'; // Default fallback
    }

    const currentOSID = getOS();
    const currentOS = platforms[currentOSID];

    // 3. Render Main Area
    function renderMainArea(downloadUrl, hashUrl) {
      const area = document.getElementById('main-download-area');
      
      let instructionHtml = '';
      if (currentOSID === 'windows') {
        instructionHtml = `
          <div class="install-instructions">
            <strong>Standard Installation:</strong>
            <ul>
              <li>Run the downloaded .exe file</li>
              <li>If SmartScreen appears, click "More info" ➔ "Run anyway"</li>
            </ul>
          </div>`;
      } else if (currentOSID === 'android') {
        instructionHtml = `
          <div class="install-instructions">
            <strong>Manual APK Installation:</strong>
            <ul>
              <li>Tap the downloaded file to install</li>
              <li>Go to Settings and toggle <b>"Allow from this source"</b> if prompted</li>
            </ul>
          </div>`;
      } else if (currentOSID === 'mac') {
        instructionHtml = `
          <div class="install-instructions">
            <strong>Standard macOS Installation:</strong>
            <ul>
              <li>Open the .dmg file</li>
              <li>Drag Orbits to the Applications folder</li>
            </ul>
          </div>`;
      } else if (currentOSID === 'ios') {
        instructionHtml = `
          <div class="install-instructions">
            <strong>Web App Installation:</strong>
            <ul>
              <li>Tap the Share button <span style="font-size: 16px;">(⎋)</span></li>
              <li>Select <b>"Add to Home Screen"</b></li>
            </ul>
          </div>`;
      }

      area.innerHTML = `
        <a href="${downloadUrl}" class="main-btn ${currentOS.btnClass}" id="main-action-btn">
          <span class="main-icon">${currentOS.icon}</span> ${currentOS.actionText}
        </a>
        
        <div class="badges">
          <div class="badge">🚀 Direct download</div>
          <div class="badge">🛡️ No app stores</div>
        </div>

        ${instructionHtml}

        ${hashUrl ? `<a href="${hashUrl}" target="_blank" class="hash-link">Verify Integrity (SHA256)</a>` : ''}
      `;

      if (currentOSID === 'ios' && currentOS.type === 'webapp') {
         // Modify button nicely
         document.getElementById('main-action-btn').href = '/index.html'; // Or absolute URL if hosted
      }
    }

    // 4. Render Other Platforms
    function renderOtherPlatforms(linksData) {
      document.getElementById('other-platforms').style.display = 'block';
      const grid = document.getElementById('other-platforms-grid');
      
      Object.keys(platforms).forEach(key => {
        if (key === currentOSID) return;
        const p = platforms[key];
        
        // Link resolution
        let link = '#';
        if (p.type === 'webapp') {
          link = '/index.html';
        } else if (linksData[key]) {
          link = linksData[key].url;
        }

        grid.innerHTML += `
          <a href="${link}" class="small-btn">
            <span class="icon">${p.icon}</span>
            <span>${p.name}</span>
          </a>
        `;
      });
    }

    // 5. Fetch Latest Release Data
    async function init() {
      try {
        const res = await fetch(`https://api.github.com/repos/${REPO}/releases/latest`);
        const data = await res.json();
        
        if (!data || !data.assets) throw new Error("No assets found");

        const links = {
          windows: { url: null, hash: null },
          android: { url: null, hash: null },
          mac: { url: null, hash: null }
        };

        // Parse Assets
        data.assets.forEach(a => {
          if (a.name.endsWith('.exe') && a.name.includes('Setup')) links.windows.url = a.browser_download_url;
          if (a.name.endsWith('.apk')) links.android.url = a.browser_download_url;
          if (a.name.endsWith('.dmg')) links.mac.url = a.browser_download_url;
          
          if (a.name === 'Orbit-Windows.sha256.txt') links.windows.hash = a.browser_download_url;
          if (a.name === 'Orbit-Android.sha256.txt') links.android.hash = a.browser_download_url;
        });

        // Determine main button link
        let mainLink = '#';
        let mainHash = null;
        if (currentOS.type === 'download' && links[currentOSID]) {
           mainLink = links[currentOSID].url || '#';
           mainHash = links[currentOSID].hash || null;
        } else if (currentOS.type === 'webapp') {
           mainLink = '/index.html';
        }

        renderMainArea(mainLink, mainHash);
        renderOtherPlatforms(links);
        
      } catch (err) {
        console.error("Failed to load GitHub release data:", err);
        // Fallback layout in case of API limit or fetch error
        renderMainArea('#', null);
        document.querySelector('#main-download-area .install-instructions').insertAdjacentHTML('afterbegin', '<p style="color:#ff4545;margin-bottom:10px;">⚠️ Не удалось получить ссылку (возможно нет билда или проблема с API).</p>');
        renderOtherPlatforms({windows:{url:'#'}, android:{url:'#'}, mac:{url:'#'}});
      }
    }

    // Start
    init();
  </script>
</body>
</html>
