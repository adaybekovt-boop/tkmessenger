name: orbits_native
description: A decentralized P2P messenger powered by WebRTC and Hive.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Провайдер нативного WebRTC для P2P 
  flutter_webrtc: ^0.10.4
  
  # База данных Hive (для 10ГБ истории и молниеносного чтения)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.1
  
  # Архитектура и внедрение зависимостей
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  get_it: ^7.6.4
  dartz: ^0.10.1 # для функционального программирования и обработки ошибок (Either)
  
  # Иконки
  cupertino_icons: ^1.0.2

  # Fortress Mode (Этап 3)
  local_auth: ^2.1.8
  flutter_windowmanager: ^0.2.1 # Для установления FLAG_SECURE (Android)
  crypto: ^3.0.3 # Для хеширования мастер-паролей

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.6
  hive_generator: ^2.0.1
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
