<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#0F1319" />
    <meta name="description" content="Orbits Titan — децентрализованный P2P‑мессенджер. Чаты и звонки без серверов." />

    <!-- PWA: mobile web app -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Orbits Titan" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-TileColor" content="#0a0a0f" />

    <!-- iOS: apple-touch-icon -->
    <link rel="apple-touch-icon" sizes="192x192" href="./pwa-192x192.svg" />
    <link rel="apple-touch-icon" sizes="512x512" href="./pwa-512x512.svg" />

    <!-- OG tags -->
    <meta property="og:title" content="Orbits Titan" />
    <meta property="og:description" content="Децентрализованный P2P‑мессенджер: чаты и звонки напрямую между устройствами" />
    <meta property="og:type" content="website" />

    <!-- Fonts: Inter = default body, Roboto Mono = default mono. The rest are
         loaded for per-theme typography (Graphite = Manrope, Paper = Geist +
         Instrument Serif, Sakura Zen = Cormorant Garamond + Shippori Mincho,
         Matrix = JetBrains Mono). All use display=swap so initial render is
         never blocked on the network. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto+Mono:wght@400;500;600&family=Manrope:wght@400;500;600;700&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Shippori+Mincho:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <link rel="icon" href="./pwa-192x192.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.json" />

    <!-- iOS splash screen (prevents white flash) -->
    <style>
      html { background: #0F1319; }
      body { background: #0F1319; }
    </style>

    <title>Orbits Titan</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
